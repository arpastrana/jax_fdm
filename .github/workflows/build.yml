name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel a PR's in-flight run when new commits are pushed to it. Never cancel a
# main push (post-merge build), so it always runs to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-package:
    if: "!contains(github.event.pull_request.labels.*.name, 'docs-only')"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10']
        # Cover the supported ceiling (3.11, 3.12) on one runner each without
        # fanning them out across every OS.
        include:
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # PySide6 (via compas_viewer) links against system GL libraries that the
      # headless Linux runners do not ship.
      - name: Install GL libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libopengl0

      - name: Install package
        run: pip install -e ".[dev,viz]"

      - name: Lint with ruff
        run: ruff check .

      # The suite recompiles the same jitted equilibrium models every run, so
      # the runtime is XLA-compilation-bound. Persist the compiled kernels
      # across CI runs; the key includes the jax version so a jax bump (which
      # changes the emitted HLO) starts a fresh cache. The absolute dir goes
      # through GITHUB_ENV so actions/cache and JAX resolve the same path
      # (GitHub does not expand ~ inside an env: block, and JAX reads it raw).
      - name: Resolve jit cache location
        id: jax
        shell: bash
        run: |
          echo "version=$(python -c 'import jax; print(jax.__version__)')" >> "$GITHUB_OUTPUT"
          echo "JAX_COMPILATION_CACHE_DIR=$RUNNER_TEMP/jax_fdm_jit_cache" >> "$GITHUB_ENV"

      - name: Cache compiled XLA kernels
        uses: actions/cache@v4
        with:
          path: ${{ env.JAX_COMPILATION_CACHE_DIR }}
          key: jax-jit-${{ matrix.os }}-py${{ matrix.python-version }}-jax${{ steps.jax.outputs.version }}

      - name: Run tests
        run: pytest
