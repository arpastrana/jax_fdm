site_name: JAX FDM
site_description: Auto-differentiable and hardware-accelerated force density method
site_author: Rafael Pastrana
site_url: https://arpastrana.github.io/jax_fdm/
repo_url: https://github.com/arpastrana/jax_fdm
repo_name: arpastrana/jax_fdm
copyright: Copyright &copy; 2026 Rafael Pastrana

strict: true

extra:
  version:
    provider: mike
    default: latest

# Internal planning documents and build hooks are kept out of the built site.
exclude_docs: |
  mkdocs-migration-plan.md
  hooks/

# The citation page's BibTeX is generated from CITATION.cff at build time.
hooks:
  - docs/hooks/citation.py

watch:
  - CITATION.cff

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  logo: assets/images/jax_logo.svg
  favicon: assets/images/jax_logo.svg
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [docs, examples, "."]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: "¤"

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)'
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://compas.dev/compas/latest/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://docs.jax.dev/en/latest/objects.inv
          options:
            docstring_style: numpy
            docstring_options:
              ignore_init_summary: true
              trim_doctest_flags: true
            docstring_section_style: list
            filters: public
            heading_level: 2
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_bases: false
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true

nav:
  - Overview: index.md
  - Installation: installation.md
  - Examples: examples.md
  - API reference:
      - api/jax_fdm.datastructures.md
      - api/jax_fdm.equilibrium.md
      - api/jax_fdm.goals.md
      - api/jax_fdm.constraints.md
      - api/jax_fdm.losses.md
      - api/jax_fdm.optimization.md
      - api/jax_fdm.parameters.md
      - api/jax_fdm.geometry.md
      - Visualization:
          - api/jax_fdm.visualization.viewers.md
          - api/jax_fdm.visualization.notebooks.md
          - api/jax_fdm.visualization.plotters.md
  - Citation: citation.md
  - License: license.md
