# Pre-commit hooks for jax_fdm. Install with:
#
#     pre-commit install
#
# Run against all files with:
#
#     pre-commit run --all-files
#
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      # Lint and auto-fix (imports, pycodestyle, pyflakes). Mirrors `ruff check`
      # in CI.
      - id: ruff
        args: [--fix]
      # Format the code, including snippets inside docstrings.
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Data fixtures under data/ are excluded so the JSON files stay byte-stable.
      - id: trailing-whitespace
        exclude: ^data/
      - id: end-of-file-fixer
        exclude: ^data/
      # --unsafe checks YAML syntax without constructing custom tags; mkdocs.yml
      # uses !!python/name:... tags (pymdownx fences) that the default loader
      # cannot build.
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict

  - repo: local
    hooks:
      # The docs citation page is generated from CITATION.cff, but GitHub
      # renders the README raw, so its hand-written BibTeX can drift. Fail if
      # the README stops citing the preferred DOI from CITATION.cff.
      - id: readme-cites-preferred-doi
        name: README cites the preferred DOI from CITATION.cff
        entry: python docs/hooks/citation.py
        language: python
        additional_dependencies: [pyyaml]
        files: ^(README\.md|CITATION\.cff)$
        pass_filenames: false
