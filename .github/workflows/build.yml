name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-package:
    if: "!contains(github.event.pull_request.labels.*.name, 'docs-only')"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10']
        # Cover the supported ceiling (3.11, 3.12) on one runner each without
        # fanning them out across every OS.
        include:
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # PySide6 (via compas_viewer) links against system GL libraries that the
      # headless Linux runners do not ship.
      - name: Install GL libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libopengl0

      - name: Install package
        run: pip install -e ".[dev,viz]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest
