name: docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  JAX_PLATFORMS: cpu

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # PySide6 (via compas_viewer) links against system GL libraries that the
      # headless Linux runners do not ship.
      - name: Install GL libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libopengl0

      - name: Install package
        run: pip install ".[viz,docs]"

      - name: Build docs
        run: mkdocs build --strict

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # mike reads and commits the gh-pages branch.
          fetch-depth: 0

      - name: Configure git credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install GL libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libopengl0

      - name: Install package
        run: pip install ".[viz,docs]"

      # Pushes to main update the rolling "dev" docs; a release tag vX.Y.Z
      # publishes the "X.Y.Z" version and points the "latest" alias (the
      # site's default landing version) at it.
      - name: Deploy dev docs
        if: github.ref == 'refs/heads/main'
        run: mike deploy --push --update-aliases dev

      - name: Deploy release docs
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mike deploy --push --update-aliases "$VERSION" latest
          mike set-default --push latest
